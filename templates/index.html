<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centering App</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #0d1117; color: #c9d1d9; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh;}
        
        .top-bar { background-color: #161b22; border-bottom: 1px solid #30363d; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; z-index: 100;}
        .app-title { font-size: 1.5em; font-weight: bold; color: #58a6ff; margin: 0;}
        
        .file-controls { display: flex; gap: 15px; }
        .btn { background-color: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .btn:hover { background-color: #30363d; color: white; }
        .btn-primary { background-color: #238636; border-color: #2ea043; color: white;}
        .btn-primary:hover { background-color: #2ea043; }
        
        /* Hide default file inputs */
        input[type="file"] { display: none; }
        
        .workspace { display: flex; flex: 1; padding: 20px; gap: 30px; align-items: center; justify-content: center; position: relative;}
        
        .img-wrapper { position: relative; border-radius: 10px; border: 2px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; background-color: #000; cursor: crosshair;}
        #back-wrapper img { cursor: crosshair; }
        canvas { display: block; }
        
        /* CSS Hover Lines */
        .crosshair-line { position: absolute; pointer-events: none; z-index: 20; display: none; transition: transform 0.1s linear;}
        #crosshair-x { width: 100%; height: 2px; left: 0; background-image: linear-gradient(to right, rgba(255, 0, 255, 0.9) 10px, transparent 10px); background-size: 20px 2px; }
        #crosshair-y { height: 100%; width: 2px; top: 0; background-image: linear-gradient(to bottom, rgba(255, 0, 255, 0.9) 10px, transparent 10px); background-size: 2px 20px; }
        
        /* Unified Canvas Loupe */
        #loupe-container { position: absolute; width: 240px; height: 240px; border: 2px solid #ff00ff; border-radius: 50%; box-shadow: 0 0 15px rgba(0,0,0,0.9); pointer-events: none; display: none; z-index: 1050; background-color: #0d1117; overflow: hidden; }
        #loupe-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .loupe-cross-line { position: absolute; pointer-events: none; z-index: 1051; display: none;}
        #loupe-x { width: 100%; height: 1px; top: 50%; left: 0; background-color: rgba(255, 0, 255, 0.5); transform: translateY(-50%);}
        #loupe-y { height: 100%; width: 1px; left: 50%; top: 0; background-color: rgba(255, 0, 255, 0.5); transform: translateX(-50%);}
        
        #tool-state-text { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #1d76db; color: white; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 1.2em; z-index: 1100;}
        #math-box { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); display: none; background-color: #21262d; border: 2px solid #30363d; border-radius: 8px; padding: 15px 30px; text-align: center; font-size: 1.4em; font-weight: bold; color: #c9d1d9; z-index: 1100; box-shadow: 0 5px 15px rgba(0,0,0,0.5);}
        
        .controls-map { position: absolute; left: 20px; bottom: 20px; background-color: #161b22; padding: 15px; border-radius: 8px; border: 1px solid #30363d; font-size: 0.85em; color: #8b949e; line-height: 1.6; z-index: 100; display: flex; gap: 30px;}
        .controls-map strong { color: #58a6ff; }
        .controls-map .key { background: #21262d; border: 1px solid #4b5563; padding: 2px 6px; border-radius: 4px; color: #c9d1d9; font-family: monospace;}
        
        /* Loading Text */
        #loading-overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(13,17,23,0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; font-size: 2em; font-weight: bold; color: #58a6ff;}
    </style>
</head>
<body>
    <div id="loading-overlay">Loading Defaults...</div>

    <div class="top-bar">
        <h1 class="app-title">Centering App</h1>
        <div class="file-controls">
            <button class="btn" onclick="loadDefaults()">↻ Load Defaults</button>
            <button class="btn" onclick="document.getElementById('front-upload').click()">+ Browse Front...</button>
            <button class="btn" onclick="document.getElementById('back-upload').click()">+ Browse Back...</button>
            <button class="btn btn-primary" id="save-btn" onclick="resetToNewCard()" style="display:none;">Save & Next</button>
            <button class="btn" style="background-color: #da3633; border-color: #b32d2a; color: white;" onclick="exitApp()">Exit App</button>
            
            <input type="file" id="front-upload" accept="image/*" onchange="handleFileUpload(event, 'front')">
            <input type="file" id="back-upload" accept="image/*" onchange="handleFileUpload(event, 'back')">
        </div>
    </div>
    
    <div class="workspace">
        <div id="tool-state-text" style="display:none;"></div>
        <div id="math-box">L/R: -- | T/B: --</div>
        
        <div class="img-wrapper" id="sniper-wrapper">
            <canvas id="sniper-canvas"></canvas>
            <div id="crosshair-x" class="crosshair-line"></div>
            <div id="crosshair-y" class="crosshair-line"></div>
        </div>
        
        <div class="img-wrapper" id="back-wrapper">
            <img id="speed-back" src="" alt="No Backside Loaded" style="display: block; max-height: 75vh; max-width: 40vw; object-fit: contain;">
        </div>
        
        <img id="hidden-source" src="" crossorigin="anonymous" style="display:none;">
    </div>
    
    <div id="loupe-container">
        <canvas id="loupe-canvas" width="240" height="240"></canvas>
        <div id="loupe-x" class="loupe-cross-line"></div>
        <div id="loupe-y" class="loupe-cross-line"></div>
    </div>

    <div class="controls-map">
        <div>
            <strong>Left Hand (Keyboard Tuning)</strong><br>
            <span class="key">W / S</span> : Nudge Up / Down<br>
            <span class="key">A / D</span> : Nudge Left / Right<br>
            <span class="key">Q / E</span> : Tilt Edge Angle<br>
            <span class="key">Space</span> : Lock Current Edge<br>
            <span class="key">Z</span> : Undo Last Lock<br>
        </div>
        <div>
            <strong>Right Hand (View)</strong><br>
            <span class="key">+ / -</span> : Adjust Loupe Zoom<br>
            <span class="key">Shift</span> : Hold for Sub-Pixel Precision<br>
            <span class="key">Esc</span> : Reset UI<br>
        </div>
    </div>

    <script>
        // --- APP STATE ---
        let currentFrontFilename = "manual_card.jpg";
        let currentZoom = 2.5;

        function exitApp() {
            if(confirm("Are you sure you want to exit the app?")) {
                fetch('/exit', { method: 'POST' }).then(() => {
                    document.body.innerHTML = "<h1 style='text-align:center; margin-top: 20%; color: #c9d1d9;'>App Closed. You can safely close this tab.</h1>";
                }).catch(() => {
                    document.body.innerHTML = "<h1 style='text-align:center; margin-top: 20%; color: #c9d1d9;'>App Closed. You can safely close this tab.</h1>";
                });
            }
        }

        // --- FILE LOADING LOGIC ---
        document.addEventListener("DOMContentLoaded", () => {
            loadDefaults();
        });

        function loadDefaults() {
            document.getElementById('loading-overlay').style.display = 'flex';
            fetch('/get_defaults')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('loading-overlay').style.display = 'none';
                    if(data.front) {
                        currentFrontFilename = data.front_filename;
                        loadFrontImage(data.front);
                    } else {
                        updateStateText("No default front image found in scans folder.", "#da3633");
                    }
                    
                    if(data.back) {
                        document.getElementById('speed-back').src = data.back;
                        document.getElementById('speed-back').alt = "";
                    } else {
                        document.getElementById('speed-back').src = "";
                        document.getElementById('speed-back').alt = "No Backside Found";
                    }
                });
        }

        // Native Browser File Handling (Zero Backend Needed for Browsing!)
        function handleFileUpload(event, type) {
            const file = event.target.files[0];
            if (!file) return;
            
            const objectURL = URL.createObjectURL(file);
            if (type === 'front') {
                currentFrontFilename = file.name;
                loadFrontImage(objectURL);
            } else {
                document.getElementById('speed-back').src = objectURL;
                document.getElementById('speed-back').alt = "";
            }
            // Reset input so you can select the same file again if needed
            event.target.value = ""; 
        }

        function loadFrontImage(srcUrl) {
            const hidImg = document.getElementById('hidden-source');
            const canvas = document.getElementById('sniper-canvas');
            const sWrap = document.getElementById('sniper-wrapper');
            
            document.getElementById('save-btn').style.display = 'none';
            mathBox.style.display = 'none';
            
            hidImg.onload = () => {
                const maxW = window.innerWidth * 0.45;
                const maxH = window.innerHeight * 0.75;
                const ratio = Math.min(maxW / hidImg.naturalWidth, maxH / hidImg.naturalHeight);
                
                const exactW = hidImg.naturalWidth * ratio;
                const exactH = hidImg.naturalHeight * ratio;
                
                sWrap.style.width = exactW + 'px'; sWrap.style.height = exactH + 'px';
                canvas.style.width = exactW + 'px'; canvas.style.height = exactH + 'px';
                canvas.width = hidImg.naturalWidth; canvas.height = hidImg.naturalHeight;
                
                resetSniperState();
                hidImg.onload = null;
            };
            hidImg.src = srcUrl;
        }

        function resetToNewCard() {
            document.getElementById('save-btn').style.display = 'none';
            mathBox.style.display = 'none';
            resetSniperState();
        }

        // --- MATH LIBRARY ---
        function getHomography(src, dst) {
            let A = [];
            for (let i = 0; i < 4; i++) {
                let x = src[i].x, y = src[i].y;
                let u = dst[i].x, v = dst[i].y;
                A.push([x, y, 1, 0, 0, 0, -u*x, -u*y, u]);
                A.push([0, 0, 0, x, y, 1, -v*x, -v*y, v]);
            }
            for (let i = 0; i < 8; i++) {
                let maxRow = i;
                for (let j = i + 1; j < 8; j++) if (Math.abs(A[j][i]) > Math.abs(A[maxRow][i])) maxRow = j;
                let temp = A[i]; A[i] = A[maxRow]; A[maxRow] = temp;
                for (let j = i + 1; j < 8; j++) {
                    let f = A[j][i] / A[i][i];
                    for (let k = i; k < 9; k++) A[j][k] -= A[i][k] * f;
                }
            }
            let h = new Array(8);
            for (let i = 7; i >= 0; i--) {
                let sum = 0;
                for (let j = i + 1; j < 8; j++) sum += A[i][j] * h[j];
                h[i] = (A[i][8] - sum) / A[i][i];
            }
            h.push(1.0);
            return h;
        }

        function applyHomography(p, h) {
            let u = h[0]*p.x + h[1]*p.y + h[2];
            let v = h[3]*p.x + h[4]*p.y + h[5];
            let w = h[6]*p.x + h[7]*p.y + h[8];
            return {x: u/w, y: v/w};
        }

        function intersect(l1, l2) {
            let dx = l2.cx - l1.cx;
            let dy = l2.cy - l1.cy;
            let det = Math.cos(l2.angle) * Math.sin(l1.angle) - Math.sin(l2.angle) * Math.cos(l1.angle);
            if (Math.abs(det) < 1e-6) return null; 
            let u = (dy * Math.cos(l2.angle) - dx * Math.sin(l2.angle)) / det;
            return {
                x: l1.cx + u * Math.cos(l1.angle),
                y: l1.cy + u * Math.sin(l1.angle)
            };
        }

        // --- THE SNIPER ENGINE (BORDER CENTERING LOGIC) ---
        let lines = [];        
        let draftLine = null;  
        let clicks = [];       
        let draftClick = null;
        
        let flattened = false;
        let isDragging = false;
        let dragStart = {x:0, y:0};
        let dragCurrent = {x:0, y:0};
        
        let finalImageBase64 = "";
        let cachedImageData = null; 
        let lastSavedFilename = "";
        
        const canvas = document.getElementById('sniper-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const backImg = document.getElementById('speed-back');
        
        const stateText = document.getElementById('tool-state-text');
        const mathBox = document.getElementById('math-box');
        
        const cxLine = document.getElementById('crosshair-x');
        const cyLine = document.getElementById('crosshair-y');
        
        const loupeContainer = document.getElementById('loupe-container');
        const loupeCtx = document.getElementById('loupe-canvas').getContext('2d', { willReadFrequently: true });
        const loupeX = document.getElementById('loupe-x');
        const loupeY = document.getElementById('loupe-y');
        
        let lRatioStr = "--";
        let tRatioStr = "--";
        let shiftPressed = false;
        let hoverTarget = 'front';
        let lastInternalX = 0;
        let lastInternalY = 0;

        document.addEventListener('keydown', e => {
            if (e.ctrlKey || e.metaKey) return;
            const k = e.key.toLowerCase();
            
            if (e.code === 'Equal' || e.code === 'NumpadAdd' || e.key === '+') {
                currentZoom = Math.min(10, currentZoom + 0.5);
                if (shiftPressed) updateLoupe(lastMouseE);
                return;
            }
            if (e.code === 'Minus' || e.code === 'NumpadSubtract' || e.key === '-') {
                currentZoom = Math.max(1, currentZoom - 0.5);
                if (shiftPressed) updateLoupe(lastMouseE);
                return;
            }
            
            if (e.repeat && !['w','a','s','d','q','e'].includes(k)) return;
            
            if (e.key === 'Escape') resetToNewCard();
            else if (e.key === 'Shift') { shiftPressed = true; updateLoupe(lastMouseE); }
            else if (k === 'z') { undoClick(); }
            else if (e.key === ' ') { 
                e.preventDefault(); 
                if (!flattened && draftLine) {
                    lines.push(draftLine);
                    draftLine = null;
                    if (lines.length === 4) attemptFlatten();
                    else updateStateText(`Phase 1: Swipe Outer Edge (${lines.length}/4)`);
                    drawState();
                } else if (flattened && draftClick) {
                    clicks.push(draftClick);
                    draftClick = null;
                    
                    if (clicks.length === 4) {
                        cxLine.style.display = 'none'; cyLine.style.display = 'none'; loupeContainer.style.display = 'none';
                        calculateFinalMath();
                    } else {
                        updateStateText(`Phase 2: Drop Inner Border (${clicks.length}/4)`);
                        syncCSSCrosshairs();
                    }
                    drawState();
                }
            } 
            else if (['w','s','a','d'].includes(k)) {
                e.preventDefault();
                const step = shiftPressed ? 0.5 : 2.0; 
                
                if (!flattened && draftLine) {
                    if (k === 'w') draftLine.cy -= step;
                    if (k === 's') draftLine.cy += step;
                    if (k === 'a') draftLine.cx -= step;
                    if (k === 'd') draftLine.cx += step;
                    drawState();
                    if(shiftPressed) updateLoupe(lastMouseE);
                } 
                else if (flattened && draftClick) {
                    if (k === 'w') draftClick.y -= step;
                    if (k === 's') draftClick.y += step;
                    if (k === 'a') draftClick.x -= step;
                    if (k === 'd') draftClick.x += step;
                    
                    draftClick.x = Math.max(0, Math.min(canvas.width, draftClick.x));
                    draftClick.y = Math.max(0, Math.min(canvas.height, draftClick.y));
                    
                    drawState();
                    syncCSSCrosshairs(); 
                }
            }
            else if (['q','e'].includes(k)) {
                e.preventDefault();
                if (!flattened && draftLine) {
                    const step = shiftPressed ? 0.002 : 0.01; 
                    if (k === 'q') draftLine.angle -= step;
                    if (k === 'e') draftLine.angle += step;
                    drawState();
                    if(shiftPressed) updateLoupe(lastMouseE);
                }
            }
        });
        
        document.addEventListener('keyup', e => {
            if (e.key === 'Shift') { shiftPressed = false; loupeContainer.style.display = 'none'; }
        });

        let lastMouseE = null;
        
        canvas.addEventListener('mousemove', (e) => {
            if (clicks.length >= 8) return;
            lastMouseE = e;
            hoverTarget = 'front';
            
            const rect = canvas.getBoundingClientRect();
            lastInternalX = ((e.clientX - rect.left) / rect.width) * canvas.width;
            lastInternalY = ((e.clientY - rect.top) / rect.height) * canvas.height;
            
            if (!flattened && isDragging) {
                dragCurrent = {x: lastInternalX, y: lastInternalY};
                drawState();
            } 
            
            syncCSSCrosshairs();
        });

        canvas.addEventListener('mouseleave', () => {
            cxLine.style.display = 'none'; cyLine.style.display = 'none'; loupeContainer.style.display = 'none';
        });

        backImg.addEventListener('mousemove', (e) => {
            lastMouseE = e;
            hoverTarget = 'back';
            
            cxLine.style.display = 'none'; cyLine.style.display = 'none';
            
            const rect = backImg.getBoundingClientRect();
            lastInternalX = ((e.clientX - rect.left) / rect.width) * backImg.naturalWidth;
            lastInternalY = ((e.clientY - rect.top) / rect.height) * backImg.naturalHeight;
            
            if (shiftPressed) updateLoupe(e);
        });

        backImg.addEventListener('mouseleave', () => {
            loupeContainer.style.display = 'none';
        });
        
        function syncCSSCrosshairs() {
            if (hoverTarget !== 'front') {
                cxLine.style.display = 'none'; cyLine.style.display = 'none';
                return;
            }
            
            if (!flattened || draftClick) {
                cxLine.style.display = 'none'; cyLine.style.display = 'none';
                
                let lx = lastInternalX, ly = lastInternalY;
                if (flattened && draftClick) {
                    if (clicks.length === 0 || clicks.length === 1) lx = draftClick.x;
                    else ly = draftClick.y;
                }
                const rect = canvas.getBoundingClientRect();
                const cssX = (lx / canvas.width) * rect.width;
                const cssY = (ly / canvas.height) * rect.height;
                const fakeE = { pageX: rect.left + cssX + window.scrollX, pageY: rect.top + cssY + window.scrollY };
                if (shiftPressed) updateLoupe(fakeE);
                return;
            }
            
            const rect = canvas.getBoundingClientRect();
            const cssX = (lastInternalX / canvas.width) * rect.width;
            const cssY = (lastInternalY / canvas.height) * rect.height;

            if (clicks.length === 0 || clicks.length === 1) {
                cyLine.style.display = 'block'; cxLine.style.display = 'none';
                cyLine.style.left = (cssX - 1) + 'px'; 
                cyLine.style.top = '0px'; 
            } else if (clicks.length === 2 || clicks.length === 3) {
                cxLine.style.display = 'block'; cyLine.style.display = 'none';
                cxLine.style.top = (cssY - 1) + 'px'; 
                cxLine.style.left = '0px'; 
            }
            
            const fakeE = { pageX: rect.left + cssX + window.scrollX, pageY: rect.top + cssY + window.scrollY };
            if (shiftPressed) updateLoupe(fakeE);
        }

        function updateLoupe(e) {
            if (!e || !shiftPressed || (hoverTarget === 'front' && clicks.length >= 4)) return;
            
            loupeContainer.style.display = 'block';
            loupeContainer.style.left = (e.pageX - 120) + 'px';
            loupeContainer.style.top = (e.pageY - 120) + 'px';
            
            let activeZoom = currentZoom;
            if (flattened) {
                const hidImg = document.getElementById('hidden-source');
                if (hidImg && hidImg.naturalWidth) {
                    const scaleFactor = canvas.width / hidImg.naturalWidth;
                    activeZoom = currentZoom / scaleFactor;
                }
            }
            
            const sW = 240 / activeZoom;
            const sH = 240 / activeZoom;
            
            if (hoverTarget === 'front') {
                loupeContainer.style.backgroundImage = 'none'; 
                
                let cx = lastInternalX, cy = lastInternalY;
                
                if (flattened) {
                    if (draftClick) {
                        loupeX.style.display = 'none'; loupeY.style.display = 'none';
                        if (clicks.length === 0 || clicks.length === 1) cx = draftClick.x;
                        else cy = draftClick.y;
                    } else {
                        if (clicks.length === 0 || clicks.length === 1) {
                            loupeY.style.display = 'block'; loupeX.style.display = 'none';
                        } else {
                            loupeX.style.display = 'block'; loupeY.style.display = 'none';
                        }
                    }
                } else {
                    loupeX.style.display = 'none'; loupeY.style.display = 'none';
                }
                
                const sx = cx - sW / 2;
                const sy = cy - sH / 2;
                
                loupeCtx.clearRect(0, 0, 240, 240);
                loupeCtx.drawImage(canvas, sx, sy, sW, sH, 0, 0, 240, 240);
                
            } else if (hoverTarget === 'back') {
                loupeCtx.clearRect(0, 0, 240, 240);
                
                const rect = backImg.getBoundingClientRect();
                const cssX = (lastInternalX / backImg.naturalWidth) * rect.width;
                const cssY = (lastInternalY / backImg.naturalHeight) * rect.height;
                
                loupeContainer.style.backgroundImage = `url('${backImg.src}')`;
                loupeContainer.style.backgroundSize = `${rect.width * currentZoom}px ${rect.height * currentZoom}px`;
                const bgX = -(cssX * currentZoom - 120);
                const bgY = -(cssY * currentZoom - 120);
                loupeContainer.style.backgroundPosition = `${bgX}px ${bgY}px`;
            }
        }

        function resetSniperState() {
            lines = []; draftLine = null; clicks = []; draftClick = null;
            flattened = false; mathBox.style.display = 'none';
            document.getElementById('save-btn').style.display = 'none';
            finalImageBase64 = ""; cachedImageData = null;
            lastSavedFilename = "";
            isDragging = false;
            
            cxLine.style.display = 'none'; cyLine.style.display = 'none';
            
            const hidImg = document.getElementById('hidden-source');
            if (hidImg.src && hidImg.src !== window.location.href) {
                updateStateText("Phase 1: Swipe Outer Edges (Hold & Drag)");
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(hidImg, 0, 0, canvas.width, canvas.height);
            } else {
                updateStateText("Load an image to begin.", "#da3633");
            }
        }

        function updateStateText(txt, color="#1d76db") {
            stateText.style.display = 'block';
            stateText.style.background = color;
            stateText.innerText = txt;
        }

        function undoClick() {
            if (hoverTarget === 'back') return;
            
            if (clicks.length === 4) {
                if (lastSavedFilename) {
                    fetch('/delete_export', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ filename: lastSavedFilename })
                    });
                    lastSavedFilename = "";
                }

                clicks.pop();
                mathBox.style.display = 'none';
                document.getElementById('save-btn').style.display = 'none';
                syncCSSCrosshairs(); 
                updateStateText(`Phase 2: Drop Inner Border (3/4)`);
                drawState();
                return;
            }
            
            if (flattened && clicks.length === 0 && !draftClick) {
                flattened = false;
                draftLine = lines.pop(); 
                
                const hidImg = document.getElementById('hidden-source');
                const sWrap = document.getElementById('sniper-wrapper');
                
                const maxW = window.innerWidth * 0.45;
                const maxH = window.innerHeight * 0.75;
                const ratio = Math.min(maxW / hidImg.naturalWidth, maxH / hidImg.naturalHeight);
                const exactW = hidImg.naturalWidth * ratio;
                const exactH = hidImg.naturalHeight * ratio;
                
                sWrap.style.width = exactW + 'px'; sWrap.style.height = exactH + 'px';
                canvas.style.width = exactW + 'px'; canvas.style.height = exactH + 'px';
                canvas.width = hidImg.naturalWidth; canvas.height = hidImg.naturalHeight;
                
                ctx.drawImage(hidImg, 0, 0, canvas.width, canvas.height);
                
                updateStateText(`Phase 1: Tune Edge ${lines.length+1} (Space to lock)`);
                drawState();
                return;
            }
            
            if (flattened) {
                if (draftClick) draftClick = null;
                else clicks.pop();
                drawState();
                updateStateText(`Phase 2: Drop Inner Border (${clicks.length}/4)`);
                syncCSSCrosshairs();
            } else {
                if (draftLine) draftLine = null;
                else if (lines.length > 0) draftLine = lines.pop();
                drawState();
                updateStateText(draftLine ? `Phase 1: Tune Edge ${lines.length+1} (Space to lock)` : `Phase 1: Swipe Outer Edge (${lines.length}/4)`);
            }
        }

        function drawInfiniteLine(ctx, line, color, thickness=2) {
            let dx = Math.cos(line.angle) * 5000;
            let dy = Math.sin(line.angle) * 5000;
            ctx.beginPath();
            ctx.moveTo(line.cx - dx, line.cy - dy);
            ctx.lineTo(line.cx + dx, line.cy + dy);
            ctx.strokeStyle = color;
            ctx.lineWidth = thickness;
            ctx.stroke();
        }
        
        function drawPhase2Line(ctx, pt, index, color, thickness=2) {
            ctx.strokeStyle = color;
            ctx.lineWidth = thickness;
            ctx.beginPath();
            if (index === 0 || index === 1) {
                ctx.moveTo(pt.x, 0); ctx.lineTo(pt.x, canvas.height);
            } else {
                ctx.moveTo(0, pt.y); ctx.lineTo(canvas.width, pt.y);
            }
            ctx.stroke();
        }

        function drawState() {
            if(!flattened) {
                const hidImg = document.getElementById('hidden-source');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(hidImg, 0, 0, canvas.width, canvas.height);
                
                lines.forEach(l => drawInfiniteLine(ctx, l, 'rgba(255, 0, 255, 0.8)', 2));
                
                if (draftLine) drawInfiniteLine(ctx, draftLine, 'rgba(0, 255, 255, 0.9)', 1);
                
                if (isDragging) {
                    ctx.beginPath(); ctx.moveTo(dragStart.x, dragStart.y); ctx.lineTo(dragCurrent.x, dragCurrent.y);
                    ctx.strokeStyle = 'rgba(227, 179, 65, 0.8)'; ctx.lineWidth = 2; ctx.stroke();
                }
            } else {
                if (cachedImageData) {
                    ctx.putImageData(cachedImageData, 0, 0);
                }
                
                for (let i = 0; i < clicks.length; i++) {
                    drawPhase2Line(ctx, clicks[i], i, 'rgba(255, 0, 255, 0.8)', 2);
                }
                if (draftClick) {
                    drawPhase2Line(ctx, draftClick, clicks.length, 'rgba(0, 255, 255, 0.9)', 1);
                }
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 2) { e.preventDefault(); undoClick(); return; }
            if (e.button === 0) {
                if (flattened) {
                    if (!draftClick && clicks.length < 4) {
                        draftClick = { x: lastInternalX, y: lastInternalY };
                        updateStateText(`Phase 2: Tune Border ${clicks.length+1} (WASD, Space to lock)`);
                        drawState();
                        syncCSSCrosshairs();
                    }
                } else {
                    if (draftLine) return; 
                    isDragging = true;
                    dragStart = {x: lastInternalX, y: lastInternalY};
                }
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            if (!flattened && isDragging) {
                isDragging = false;
                let dx = dragCurrent.x - dragStart.x;
                let dy = dragCurrent.y - dragStart.y;
                if (Math.hypot(dx, dy) < 10) return; 
                
                draftLine = {
                    cx: (dragStart.x + dragCurrent.x) / 2,
                    cy: (dragStart.y + dragCurrent.y) / 2,
                    angle: Math.atan2(dy, dx)
                };
                
                updateStateText(`Phase 1: Tune Edge ${lines.length+1} (WASD/QE, Space to Lock)`);
                drawState();
                if(shiftPressed) updateLoupe({ pageX: e.pageX, pageY: e.pageY });
            }
        });

        canvas.addEventListener('contextmenu', e => e.preventDefault());

        function attemptFlatten() {
            let tempCorners = [];
            for(let i=0; i<4; i++){
                for(let j=i+1; j<4; j++){
                    let angleDiff = Math.abs(lines[i].angle - lines[j].angle) % Math.PI;
                    if (angleDiff > Math.PI/2) angleDiff = Math.PI - angleDiff;
                    
                    if (angleDiff > Math.PI/6) {
                        let pt = intersect(lines[i], lines[j]);
                        if (pt) tempCorners.push(pt);
                    }
                }
            }
            if (tempCorners.length !== 4) {
                updateStateText("Lines don't form a closed rectangle. Press Z to fix.", "#da3633");
                return;
            }
            
            let ccx = tempCorners.reduce((s, p) => s + p.x, 0) / 4;
            let ccy = tempCorners.reduce((s, p) => s + p.y, 0) / 4;
            let sortedCorners = tempCorners.sort((a, b) => Math.atan2(a.y - ccy, a.x - ccx) - Math.atan2(b.y - ccy, b.x - ccx));
            
            performFlatteningWarp(sortedCorners);
        }

        function performFlatteningWarp(sortedCorners) {
            flattened = true;
            updateStateText("Flattening... (Please Wait)", "#e3b341");
            cxLine.style.display = 'none'; cyLine.style.display = 'none';
            
            setTimeout(() => {
                const targetW = 1500;
                const targetH = 2100;
                
                const flatData = ctx.createImageData(targetW, targetH);
                const srcData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                const sW = canvas.width;
                const sH = canvas.height;
                
                const hInv = getHomography([{x: 0, y: 0}, {x: targetW, y: 0}, {x: targetW, y: targetH}, {x: 0, y: targetH}], sortedCorners);
                
                for (let y = 0; y < targetH; y++) {
                    for (let x = 0; x < targetW; x++) {
                        const p = applyHomography({x: x, y: y}, hInv);
                        const sx = Math.floor(p.x);
                        const sy = Math.floor(p.y);
                        
                        if (sx >= 0 && sx < sW && sy >= 0 && sy < sH) {
                            const srcIdx = (sy * sW + sx) * 4;
                            const dstIdx = (y * targetW + x) * 4;
                            flatData.data[dstIdx] = srcData[srcIdx];
                            flatData.data[dstIdx+1] = srcData[srcIdx+1];
                            flatData.data[dstIdx+2] = srcData[srcIdx+2];
                            flatData.data[dstIdx+3] = srcData[srcIdx+3]; 
                        }
                    }
                }
                
                canvas.width = targetW;
                canvas.height = targetH;
                ctx.putImageData(flatData, 0, 0);
                
                finalImageBase64 = canvas.toDataURL("image/jpeg", 0.95);
                
                cachedImageData = ctx.getImageData(0, 0, canvas.width, canvas.height); 
                
                const sWrap = document.getElementById('sniper-wrapper');
                const maxW = window.innerWidth * 0.45;
                const maxH = window.innerHeight * 0.75;
                const ratio = Math.min(maxW / targetW, maxH / targetH);
                
                const exactW = targetW * ratio;
                const exactH = targetH * ratio;
                sWrap.style.width = exactW + 'px'; sWrap.style.height = exactH + 'px';
                canvas.style.width = exactW + 'px'; canvas.style.height = exactH + 'px';
                
                updateStateText("Phase 2: Drop Inner Border (1/4)", "#1d76db");
                syncCSSCrosshairs(); 
                
            }, 50); 
        }

        function calculateFinalMath() {
            let leftPx = Math.min(clicks[0].x, clicks[1].x);
            let rightPx = Math.max(clicks[0].x, clicks[1].x);
            let topPx = Math.min(clicks[2].y, clicks[3].y);
            let botPx = Math.max(clicks[2].y, clicks[3].y);
            
            let lr_ratio = Math.round((leftPx / (leftPx + (1500 - rightPx))) * 100);
            lRatioStr = `${lr_ratio}/${100 - lr_ratio}`;
            
            let tb_ratio = Math.round((topPx / (topPx + (2100 - botPx))) * 100);
            tRatioStr = `${tb_ratio}/${100 - tb_ratio}`;
            
            updateStateText("Perspective Corrected & Saved!", "#3fb950");
            displayMath();
            saveMathToBackend();
        }

        function displayMath() {
            mathBox.style.display = 'block';
            document.getElementById('save-btn').style.display = 'block';
            
            let lrNums = lRatioStr.split('/');
            let lrCol = Math.max(Number(lrNums[0]), Number(lrNums[1])) <= 55 ? '#3fb950' : '#da3633';
            let tbNums = tRatioStr.split('/');
            let tbCol = Math.max(Number(tbNums[0]), Number(tbNums[1])) <= 55 ? '#3fb950' : '#da3633';
            
            mathBox.innerHTML = `L/R: <span style="color: ${lrCol}">${lRatioStr}</span> | T/B: <span style="color: ${tbCol}">${tRatioStr}</span>`;
        }

        function saveMathToBackend() {
            const finalCvs = document.createElement('canvas');
            finalCvs.width = 1500;
            finalCvs.height = 2100;
            const fCtx = finalCvs.getContext('2d');
            
            const flatImg = new Image();
            flatImg.onload = () => {
                fCtx.drawImage(flatImg, 0, 0);
                
                // Draw permanent measurement lines
                fCtx.strokeStyle = 'rgba(255, 0, 255, 0.8)';
                fCtx.lineWidth = 4; 
                for (let i = 0; i < clicks.length; i++) {
                    if (i === 0 || i === 1) {
                        fCtx.beginPath(); fCtx.moveTo(clicks[i].x, 0); fCtx.lineTo(clicks[i].x, 2100); fCtx.stroke();
                    } else {
                        fCtx.beginPath(); fCtx.moveTo(0, clicks[i].y); fCtx.lineTo(1500, clicks[i].y); fCtx.stroke();
                    }
                }

                // Draw Semi-Transparent Black Box for Ratios
                fCtx.fillStyle = "rgba(0, 0, 0, 0.6)";
                fCtx.fillRect(20, 20, 600, 100);
                
                // Print Ratios in the top left corner
                fCtx.font = "bold 50px Arial";
                fCtx.fillStyle = "#ffffff";
                fCtx.fillText(`L/R: ${lRatioStr}  |  T/B: ${tRatioStr}`, 40, 85);

                const finalSavedImageBase64 = finalCvs.toDataURL("image/jpeg", 0.95);

                fetch('/save_export', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        original_name: currentFrontFilename, 
                        image_base64: finalSavedImageBase64 
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        lastSavedFilename = data.saved_as;
                    }
                });
            };
            flatImg.src = finalImageBase64;
        }
    </script>
